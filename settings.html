<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnHub - Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f4f7fc; }
    .sidebar-link { border-radius: 12px; }
    .sidebar-link:hover { background-color: rgba(13,110,253,0.1); }
    .setting-card { transition: 0.2s; }
  </style>
</head>
<body>
<div class="container-fluid px-4 py-3">
  <div class="row g-4">
    <div class="col-lg-2 col-md-3">
      <div class="bg-white rounded-4 shadow-sm p-3"><div class="d-flex align-items-center gap-2 border-bottom pb-3 mb-3"><div class="bg-primary rounded-circle p-2 px-3 text-white fw-bold">EL</div><span class="fw-bold fs-5">EduLearn</span></div>
      <ul class="nav nav-pills flex-column gap-1">
        <li class="nav-item"><a class="nav-link text-dark sidebar-link" href="index.html"><i class="bi bi-house-door me-2"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link text-dark sidebar-link" href="classroom.html"><i class="bi bi-book me-2"></i> Classroom</a></li>
        <li class="nav-item"><a class="nav-link text-dark sidebar-link" href="scorecard.html"><i class="bi bi-trophy me-2"></i> Scorecard</a></li>
        <li class="nav-item"><a class="nav-link active bg-primary text-white sidebar-link" href="settings.html"><i class="bi bi-gear me-2"></i> Settings</a></li>
      </ul></div>
    </div>
    <div class="col-lg-10 col-md-9">
      <h2 class="fw-semibold"><i class="bi bi-sliders2"></i> Pengaturan Akun</h2>
      <div class="row mt-3">
        <div class="col-md-6">
          <div class="bg-white rounded-4 p-4 shadow-sm mb-4">
            <h5><i class="bi bi-bell"></i> Notifikasi</h5>
            <div class="form-check form-switch mt-3"><input class="form-check-input" type="checkbox" id="notifEmail" checked><label class="form-check-label" for="notifEmail">Notifikasi Email</label></div>
            <div class="form-check form-switch mt-2"><input class="form-check-input" type="checkbox" id="notifPush" checked><label class="form-check-label" for="notifPush">Notifikasi Push Browser</label></div>
            <div class="form-check form-switch mt-2"><input class="form-check-input" type="checkbox" id="notifDeadline"><label class="form-check-label" for="notifDeadline">Pengingat Deadline Quiz</label></div>
          </div>
          <div class="bg-white rounded-4 p-4 shadow-sm">
            <h5><i class="bi bi-shield-lock"></i> Privasi & Keamanan</h5>
            <div class="form-check form-switch mt-3"><input class="form-check-input" type="checkbox" id="twoFactor"><label class="form-check-label" for="twoFactor">Verifikasi dua langkah</label></div>
            <div class="mt-3"><label class="form-label">Ubah Kata Sandi</label><input type="password" class="form-control" placeholder="Kata sandi baru"></div>
            <button class="btn btn-outline-primary mt-3">Simpan Perubahan</button>
          </div>
        </div>
        <div class="col-md-6">
          <div class="bg-white rounded-4 p-4 shadow-sm mb-4">
            <h5><i class="bi bi-eye"></i> Aksesibilitas</h5>
            <div class="form-check form-switch mt-3"><input class="form-check-input" type="checkbox" id="highContrast"><label class="form-check-label" for="highContrast">Mode Kontras Tinggi</label></div>
            <div class="form-check form-switch mt-2"><input class="form-check-input" type="checkbox" id="fontScale"><label class="form-check-label" for="fontScale">Perbesar Teks (Aksesibilitas)</label></div>
            <div class="mt-3"><label class="form-label">Ukuran Font</label><select class="form-select"><option>Normal</option><option>Besar</option><option>Sangat Besar</option></select></div>
          </div>
          <div class="bg-white rounded-4 p-4 shadow-sm">
            <h5><i class="bi bi-person-badge"></i> Informasi Profil</h5>
            <div><label class="form-label">Nama Lengkap</label><input type="text" class="form-control" value="Chef Juna"></div>
            <div class="mt-2"><label class="form-label">Email</label><input type="email" class="form-control" value="name01@student.ac.id"></div>
            <button class="btn btn-primary mt-3">Perbarui Profil</button>
          </div>
        </div>
      </div>
      <div class="alert alert-light border mt-3"><i class="bi bi-info-circle"></i> Perubahan pengaturan disimpan secara lokal (demo statis).</div>
    </div>
  </div>
</div>
</body>
</html>
